 POSTFRIGIDUS_NAME:0 "Post Frigidus"
 POSTFRIGIDUS_DESC:0 "Following a rapid increase in global tempatures due to a second industrial revolution a attempt was made by Europa Space Technologies to cool the earth down using a speialized chemical which when dispursed into the atmosphere should lower global tempatures by a few degrees. Ungfortunately its too effective and sends the world into another ice age."

SYL_POSTFRIGIDUS_DESC:0 "30 Years before the great freeze Archon Investments Global (AIG) bought their way to power in the poor country of syldavia after a asteroid destroyed its capital city and most of its industrial capabilities turning the country into a corporatist safe haven for them and their many child companies, despite the peoples wishes."
 
BRK_POSTFRIGIDUS_DESC:0 "Braskovia has suffered greatly from the cold, losing most of its great nation and becoming bitter at the seeming prosperity of its balkan neighbor Syldavia making them motivated to reform their glorious nation and overtake syldavia as the greatest balkan nation"

