l_english:

 # Welcome message
 welcome.1.t:0 "Welcome to Post Frigidus"
 welcome.1.d:0 "Thank you for using our mod! \nThis is a early version (version 0.1) so there isnt alot of content here yet, currently we only have a few nations added but we are actively working on adding more content for all to enjoy! \nWe hope you enjoy this early version of our mod, please join our discord if you have any questions or suggestions!"
 welcome.1.a:0 "Thanks!"

 states.1.t:0 "[GetIntegration1Title]"
 STATES_1_t_Default:0 "Beginning negotiations for [target_state.GetName]"
 STATES_1_t_PAP:0 "sending religious mfs to [target_state.GetName]"

 states.1.d:0 "[GetIntegration1Description]"
 STATES_1_d_DEFAULT:0 "To begin integrating this terriroty back into our Holy nation, we must first negotiate with the people living there to re-integrate them into civilization, this will take aproximately 45 days"

 STATES_1_d_PAP:0 "The Church is One, Holy, Catholic, and Apostolic. All people's will submit to Rome."

 states.1.a:0 "[GetIntegration1Answer]"
 STATES_1_a_DEFAULT:0 "Begin negotiations."
 STATES_1_a_PAP:0 "Ave Christus Rex!"


 states.2.t:0 "[GetIntegration2Title]"
 STATES_2_t_Default:0 "Negotiations for [target_state.GetName] is finished"
 STATES_2_t_PAP:0 "Sending the missionaries of the Lord to [target_state.GetName]"

 states.2.d:0 "[GetIntegration2Description]"
 STATES_2_d_DEFAULT:0 "The negotiation process has finished and we can now begin re-integrating the territory, this will consume 2 of our civilian factories and take aproximately 75 days"

 STATES_2_d_PAP:0 "Our Missionaries have finished proclaiming the Holy Gospel within [target_state.GetName] and they have accepted the Lord with open arms! We will begin construction of churches throughout the territory, this will take us 75 days to finish."

 states.2.a:0 "[GetIntegration2Answer]"
 STATES_2_a_DEFAULT:0 "Begin construction."
 STATES_2_a_PAP:0 "Begin construction."


 states.3.t:0 "[GetIntegration3Title]"
 STATES_3_t_DEFAULT:0 "Integration for [target_state.GetName] is finished!"
 STATES_3_t_PAP:0 "Integration for [target_state.GetName] is finished!"

 states.3.d:0 "[GetIntegration3Description]"
 STATES_3_d_DEFAULT:0 "[target_state.GetName] has been re-integrated into our nation!"
 STATES_3_d_PAP:0 "Churches have finished construction within [target_state.GetName]!"

 states.3.a:0 "[GetIntegration3Answer]"
 STATES_3_a_DEFAULT:0 "Ok!"
 STATES_3_a_PAP:0 "Ok!"


 states.4.t:0 "[GetIntegration4Title]"
 STATES_4_t_DEFAULT:0 "Negotions with [target_state.GetName] have failed!"
 STATES_4_t_PAP:0 "Negotions with [target_state.GetName] have failed!"


 states.4.d:0 "[GetIntegration4Description]"
 STATES_4_d_DEFAULT:0 "the heathens of [target_state.GetName] have refused our generious offer to join our glorious nation and has vowed to fight with their lives to keep us out, we must attack!"

 STATES_4_d_PAP:0 "the heathens of [target_state.GetName] have refused our generious offer to join our glorious nation and has vowed to fight with their lives to keep us out, we must attack!"

 states.4.a:0 "[GetIntegration4Answer]"
 STATES_4_a_DEFAULT:0 "Attack!"
 STATES_4_a_PAP:0 "Attack!"



 syl.1.t:0 "The federation has been restored!"
 syl.1.d:0 "After many years being apart our nation is now whole again and the people are rejoicing! SLAVA SYLDAVIA"
 syl.1.a:0 "Hurrah!"

 dak.native.1.t:0 "Negotiations have begun with the Yankton Sioux"
 dak.native.1.d:0 "The Dakotan Ambassador to the Yankton Sioux has begun negotiations on our behalf. He has informed us of a list of things that the Yankton tribe has required of us before they consider integration."
 dak.native.1.a:0 "Better get on it, then."