 syl.1.t:0 "The federation has been restored!"
 syl.1.d:0 "After many years being apart our nation is now whole again and the people are rejoicing! SLAVA SYLDAVIA"
 syl.1.a:0 "Hurrah!"

 dak.1.t:0 "Chapter 1 - Restoration"
 dak.1.d:0 "In the wake of the Great Freeze, the once-thriving lands of South Dakota have been transformed into a desolate wasteland. Cities and towns, now mere shadows of their former selves, stand silent, enveloped in the cold embrace of abandonment and decay. Amidst this new, harsh wilderness, the remnants of the old world cling to survival; scattered Native tribes and the fragmented, beleaguered nation-state of Dakota endure against the odds.\n\nThe once fertile plains and bustling communities are now just memories, buried beneath a frozen landscape ruled by lawlessness and despair. Yet, within this bleak reality lies a flicker of hope. A chance not just for survival, but for a resurgence, a restoration of the great state that once was.\n\nAs the leader of Dakota, you are faced with an arduous journey ahead. The path to recovery is fraught with challenges; from reuniting the scattered factions and rebuilding a shattered infrastructure, to rekindling the spirit of the Dakotan people. Yet, the resilience and determination that defined this land and its inhabitants remain unbroken.\n\nYour task is monumental but clear - Forge a new destiny for Dakota. Reclaim the ruins, unite the tribes, and build a future from the ashes of the past. The road to greatness is steeped in hardship, but with vision and resolve, Dakota will rise once more. The restoration begins now. The fate of South Dakota is in your hands.\n\n§RGAMEPLAY INFORMATION§!\nThis nation is extremely story-driven and lore heavy. The focus tree for Dakota is set up in chapters. It is meant to play out like a story line. It is not particularly linear, however the only way to progress to the next chapter is to complete certain criteria, such as completing a focus subtree. Opening a new chapter [i]will not[/i] lock you out of focuses in previous chapters, with very few exceptions. If opening a new chapter will lock you out of a focus, you will be notified in the focus popup."
 dak.1.a:0 "An arduous task, indeed."

 dak.2.t:0 "Looking Inwards"
 dak.2.d:0 "In the aftermath of the Great Freeze, the once fertile lands of Dakota now lie dormant under a blanket of snow, a silent testament to the resilience required to survive in this new era. The immediate challenge before us is not one of expansion or external conflict, but of introspection and consolidation. The key to our future prosperity lies in the restoration of the territories that currently lie under our stewardship.\n\nOur towns and infrastructure, though battered by the harsh elements, hold the potential for rejuvenation. The homes where our ancestors once found warmth and safety stand ready to be rebuilt, serving as the cornerstone of our community's revival. The fields, once abundant with crops, await the thaw and the toil of our farmers to return to their former glory.\n\nThe time has come to forge alliances with the remaining Native tribes within our borders. Their wisdom and understanding of the land are invaluable resources in our journey towards sustainability and mutual prosperity. Together, we can share the burdens and rewards of rebuilding our homeland.\n\n'Looking Inwards' is more than a mere strategy; it is a commitment to our people, our heritage, and our land. By focusing on the revitalization of our existing domains, we lay the groundwork for a prosperous, unified Dakota. Initiatives to restore essential services, rebuild our communities, and renew our agriculture are now underway. This path we embark upon is not just about physical reconstruction, but about rekindling the spirit of our nation.\n\nThe road ahead is fraught with challenges, but it is paved with the determination of our people. Let us embrace this moment as an opportunity to strengthen our foundations, ensuring that when we are ready to look beyond our borders once more, we do so not from a position of necessity, but from one of strength and unity."
 dak.2.a:0 "We must press on."

 dak.3.t:0 "Looking Outwards"
 dak.3.d:0 "tba"
 dak.3.a:0 "To survive, we must grow."

 dak.4.t:0 "Reestablishing our Government Services"
 dak.4.d:0 "As the dawn of a new era rises over the frost-covered landscape of Dakota, the imperative to rebuild not just our homes and lands but the very fabric of our society has never been clearer. The Great Freeze has left more than just physical scars; it has unraveled the threads of basic societal functions, leaving our people in dire need of stability and care. Now, as we take our first tentative steps towards recovery, the reestablishment of essential government services stands to be a beacon of hope and a testament to our resilience.\n\nThe foundation of our renewed state begins with the cornerstone of any thriving society - healthcare. Initiatives to reopen clinics and hospitals are ready to be enacted, ensuring that all Dakotans have access to the medical care they so desperately need. Our healthcare professionals, braving the remnants of the freeze, are ready to bring healing and hope back to our communities.\n\nThe echoes of chaos that once rang through our streets demand a response. The establishment of a basic law and order framework is crucial. Recruitment drives for police forces are being initiated. Our goal is not merely to enforce, but to rebuild trust and safety, laying the groundwork for a society where law and order pave the way for peace and prosperity.\n\nThe specter of disaster has taught us the importance of being prepared. Firefighting services are being reorganized and equipped, ready to respond to any emergency. These brave men and women stand ready to protect our communities from the threats of fire and disaster, a bulwark against the uncertainty of our times.\n\nThis is not merely an administrative task; it is a moral imperative. It represents our commitment to the well-being of every citizen, our dedication to building a Dakota that can withstand the trials of the present and the uncertainties of the future. Through these efforts, we lay the foundations of a government that serves and protects its people, a government that is, once again, of the people, by the people, for the people."
 dak.4.a:0 "A hopeful step towards our future."
 dak.8.t:0 "Dakota National Congress Established"
 dak.8.d:0 "In a historic move that marks a new dawn for governance in our nation, the Dakota National Congress has officially been established, laying the cornerstone for a democratic and prosperous future. This pivotal institution, structured as a bicameral congress, features the Senate as the upper house and the House of Representatives as the lower house. This formation embodies our commitment to a balanced and representative governance system, ensuring that all voices within Dakota are heard and valued. The establishment of the Dakota National Congress comes as a beacon of hope and a testament to the resilience of our people."
 dak.8.a:0 "Finally, some semblance of order."
 dak.9.t:0 "National Highway Bill Passed!"
 dak.9.d:0 "The Dakota National Congress has just passed the groundbreaking National Highway Bill, setting the stage for an unprecedented overhaul of our nation's roadways. This ambitious initiative will see the construction of new highways and the restoration of those damaged by the Great Freeze, effectively knitting our communities closer together and opening new avenues for trade and travel. A monumental step towards our collective recovery, this legislation promises a future where Dakota is more connected and resilient than ever. Construction is poised to begin, marking a new chapter in our journey towards revitalization and unity."
 dak.9.a:0 "Wonderful news!"

 dak.native.1.t:0 "Negotiations have begun with the Yankton Sioux"
 dak.native.1.d:0 "The Dakotan Ambassador to the Yankton Sioux has begun negotiations on our behalf. He has informed us of a list of things that the Yankton tribe has required of us before they consider integration."
 dak.native.1.a:0 "Better get on it, then."